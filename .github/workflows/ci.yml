name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Build package
        run: pip wheel . --no-deps --wheel-dir dist
